name: Terraform CI

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.tf.json"
      - ".github/workflows/terraform-ci.yml"
  push:
    branches: [main]
    paths:
      - "**.tf"
      - "**.tf.json"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read

concurrency:
  group: terraform-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.10.5" # >= 1.10 for S3-native state locking (use_lockfile)
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: terraform fmt
        run: terraform fmt -check -recursive -diff

  validate:
    name: validate (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          [
            bootstrap,
            environments/dev,
            environments/qa,
            environments/stage,
            environments/production,
            environments/shared,
          ]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: terraform init (no backend)
        run: terraform init -backend=false -input=false
      - name: terraform validate
        run: terraform validate -no-color

  plan:
    name: plan (${{ matrix.env }})
    # Needs AWS + secrets — never run for fork PRs.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    needs: [fmt, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # AWS OIDC
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: dev
            vpc_cidr: "172.32.0.0/16"
            repository_names: '["dev-repo1","dev-repo2","dev-repo3","dev-repo4"]'
          - env: qa
            vpc_cidr: "172.33.0.0/16"
            repository_names: '["qa-repo1","qa-repo2","qa-repo3","qa-repo4"]'
          - env: stage
            vpc_cidr: "172.34.0.0/16"
            repository_names: '["stage-repo1","stage-repo2","stage-repo3","stage-repo4"]'
          - env: production
            vpc_cidr: "172.35.0.0/16"
            repository_names: '["prod-repo1","prod-repo2","prod-repo3","prod-repo4"]'
    env:
      TF_VAR_environment: ${{ matrix.env }}
      TF_VAR_vpc_cidr: ${{ matrix.vpc_cidr }}
      TF_VAR_repository_names: ${{ matrix.repository_names }}
    defaults:
      run:
        working-directory: environments/${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TF_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init -input=false

      - name: terraform plan
        run: terraform plan -input=false -no-color -lock=false -out=tfplan

      - name: Plan to job summary
        run: |
          {
            echo "### Terraform plan — ${{ matrix.env }}"
            echo '```'
            terraform show -no-color tfplan
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
