# Infracost project definitions. Estimates run against the HCL directly, so
# required variables are supplied here (no tfvars needed in CI).
version: 0.1

projects:
  - path: ../dev
    name: dev
    terraform_vars:
      environment: dev
      vpc_cidr: "172.32.0.0/16"
      account_id: "123456789012"
      repository_names: ["dev-repo1"]

  - path: ../qa
    name: qa
    terraform_vars:
      environment: qa
      vpc_cidr: "172.33.0.0/16"
      repository_names: ["qa-repo1"]

  - path: ../stage
    name: stage
    terraform_vars:
      environment: stage
      vpc_cidr: "172.34.0.0/16"
      repository_names: ["stage-repo1"]

  - path: ../production
    name: production
    terraform_vars:
      environment: production
      vpc_cidr: "172.35.0.0/16"
      account_id: "123456789012"
      repository_names: ["prod-repo1"]

  - path: ../shared
    name: shared
